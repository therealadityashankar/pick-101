# Curriculum Stage 1: Cube in gripper at lift height
# Easiest stage - robot starts with cube grasped and lifted, just needs to hold
experiment:
  name: "lift_curriculum_s1"
  base_dir: "runs"

training:
  timesteps: 500000
  eval_freq: 10000
  save_freq: 50000
  seed: 42
  n_envs: 4

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2

env:
  normalize_obs: true
  normalize_reward: true
  max_episode_steps: 300    # Enough time to lift + hold 3 seconds
  action_scale: 0.02        # 2cm per step max (Cartesian)
  lift_height: 0.08         # 8cm above ground
  hold_steps: 150           # Must hold for 150 steps (~3 seconds at 50Hz)
  reward_type: "dense"
  reward_version: "v11"  # v10 + action rate penalty + target bonus z>0.08
  curriculum_stage: 1       # Start with cube in gripper at lift height
  lock_wrist: true          # Lock wrist for stable holding

eval:
  episodes: 10
  video_width: 640
  video_height: 480
