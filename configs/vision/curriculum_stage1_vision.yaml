# Vision-based SAC: Stage 1 (cube already in lifted gripper — just hold it)
# Obs: 13-dim segmentation keypoints from wrist camera
experiment:
  name: "lift_vision_s1"
  base_dir: "runs"

training:
  timesteps: 500000
  eval_freq: 5000
  save_freq: 50000
  seed: 42

sac:
  learning_rate: 3.0e-4
  buffer_size: 300000
  learning_starts: 1000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1

env:
  normalize_obs: true
  normalize_reward: true
  max_episode_steps: 200
  action_scale: 0.02
  lift_height: 0.08
  hold_steps: 150
  reward_type: "dense"
  reward_version: "v11"
  curriculum_stage: 1
  lock_wrist: true
  cam_pos_noise: 0.003
  cam_euler_noise: 0.05
  obs_noise: 0.01
