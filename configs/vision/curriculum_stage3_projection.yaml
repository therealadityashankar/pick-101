# Projection-based PPO: Stage 3 (gripper near cube, open — must grasp and lift)
# Obs: 13-dim from analytic 3D->2D projection (no renderer, fully parallelisable)
experiment:
  name: "lift_proj_s3"
  base_dir: "runs"

training:
  timesteps: 2000000
  eval_freq: 10000
  save_freq: 100000
  video_eval_freq: 100000
  seed: 42
  n_envs: 8

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2

env:
  normalize_obs: true
  normalize_reward: true
  max_episode_steps: 300
  action_scale: 0.02
  lift_height: 0.08
  hold_steps: 150
  reward_type: "dense"
  reward_version: "v11_proj"
  curriculum_stage: 3
  lock_wrist: true
  cam_pos_noise: 0.003
  cam_euler_noise: 0.05
  obs_noise: 0.01
