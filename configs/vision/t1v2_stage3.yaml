# T1.1: Unified navigate‚Üígrip‚Üílift curriculum with domain randomisation
# New features vs T1:
#   - Variable cube size per episode (11mm‚Äď19mm half-size)
#   - FOV randomisation ¬Ī7¬į
#   - Extra obs: gripper_px_width, min_gripper_frac, stage
#   - Single policy handles all three stages
experiment:
  name: "lift_proj_t1v2_s3"
  base_dir: "runs"

training:
  timesteps: 50000000
  eval_freq: 5000
  save_freq: 10000
  video_eval_freq: 10000
  seed: 42
  n_envs: 8

ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2

env:
  env_class: "t1v2"         # uses LiftCubeProjectionT1V2Env
  normalize_obs: true
  normalize_reward: true
  max_episode_steps: 100
  action_scale: 0.02
  lift_height: 0.08
  hold_steps: 10
  reward_type: "dense"
  reward_version: "v_unified_straddle"
  curriculum_stage: 3
  lock_wrist: true
  freeze_cube: true
  cam_pos_noise: 0.005
  cam_euler_noise: 0.06
  obs_noise: 0.01
  # T1.1 domain randomisation
  cube_size_range: [0.011, 0.026]    # half-size metres (22mm-52mm cube width/depth)
  cube_height_range: [0.010, 0.035]  # half-size metres (20mm-70mm cube height)
  fov_noise: 7.0                     # ¬Īdegrees
